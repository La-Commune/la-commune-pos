name: Deploy to Production

# ═══════════════════════════════════════════════════════════════
# Se activa SOLO manualmente desde GitHub → Actions → Run workflow.
# Flujo: Tests → main → development → production → Build → Deploy Netlify
#
# NOTA: El POS aún NO tiene sitio de producción en Netlify.
# Cuando se cree, actualizar NETLIFY_SITE_ID con el ID correcto.
# ═══════════════════════════════════════════════════════════════

on:
  workflow_dispatch:
    inputs:
      skip_tests:
        description: "Saltar tests (solo emergencias)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

env:
  NODE_VERSION: "22"
  # TODO: Crear sitio de producción en Netlify y poner el ID aquí
  NETLIFY_SITE_ID: ""

jobs:
  # ── 1. TypeCheck ─────────────────────────────────────────
  typecheck:
    name: TypeCheck
    runs-on: ubuntu-latest
    if: ${{ inputs.skip_tests != 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Cache node_modules
        id: cache-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.cache-modules.outputs.cache-hit != 'true'
        run: npm ci
      - run: npx tsc --noEmit

  # ── 2. Unit Tests ────────────────────────────────────────
  unit-tests:
    name: Unit Tests (59 Vitest)
    runs-on: ubuntu-latest
    if: ${{ inputs.skip_tests != 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Cache node_modules
        id: cache-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.cache-modules.outputs.cache-hit != 'true'
        run: npm ci
      - run: npm run test

  # ── 3. E2E Tests (mock) ─────────────────────────────────
  e2e-tests:
    name: E2E Tests (37 Playwright)
    runs-on: ubuntu-latest
    if: ${{ inputs.skip_tests != 'true' }}
    needs: [typecheck, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Cache node_modules
        id: cache-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.cache-modules.outputs.cache-hit != 'true'
        run: npm ci
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}
          restore-keys: nextjs-${{ hashFiles('package-lock.json') }}-
      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(npx playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ steps.pw-version.outputs.version }}-chromium
      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Install Playwright system deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - name: Run E2E tests (mock mode)
        run: npx playwright test --project=chromium
        env:
          CI: true
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  # ── 4. Merge main → development ─────────────────────────
  merge-to-development:
    name: Merge main → development
    runs-on: ubuntu-latest
    needs: [typecheck, unit-tests, e2e-tests]
    if: ${{ always() && (inputs.skip_tests == 'true' || (needs.typecheck.result == 'success' && needs.unit-tests.result == 'success' && needs.e2e-tests.result == 'success')) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Merge main into development
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin
          git checkout development
          git merge origin/main --no-edit -m "ci: merge main → development (deploy #${{ github.run_number }})"
          git push origin development

  # ── 5. Merge development → production ───────────────────
  merge-to-production:
    name: Merge development → production
    runs-on: ubuntu-latest
    needs: [merge-to-development]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Merge development into production
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin
          git checkout production
          git merge origin/development --no-edit -m "ci: merge development → production (deploy #${{ github.run_number }})"
          git push origin production

  # ── 6. Deploy a Netlify (producción) ─────────────────────
  deploy:
    name: Deploy to Netlify
    runs-on: ubuntu-latest
    needs: [merge-to-production]
    steps:
      - name: Check Netlify Site ID
        run: |
          if [ -z "${{ env.NETLIFY_SITE_ID }}" ]; then
            echo "::error::NETLIFY_SITE_ID no está configurado. El POS aún no tiene sitio de producción en Netlify."
            echo "Tests pasaron ✅ y merges completados (main → development → production), pero no se puede desplegar sin sitio."
            exit 1
          fi
      - uses: actions/checkout@v4
        with:
          ref: production
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Cache node_modules
        id: cache-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        if: steps.cache-modules.outputs.cache-hit != 'true'
        run: npm ci
      - name: Build for production
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_NEGOCIO_ID: ${{ secrets.NEXT_PUBLIC_NEGOCIO_ID }}
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PIN_PASSWORD_SECRET: ${{ secrets.PIN_PASSWORD_SECRET }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
      - name: Deploy to Netlify
        run: npx netlify-cli deploy --prod --dir=.next --site=${{ env.NETLIFY_SITE_ID }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
